<!DOCTYPE html>
<html>
<head>

<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;600;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    body { margin:0; -webkit-font-smoothing:antialiased; }
    @keyframes pageFadeIn { from { opacity:0; } to { opacity:1; } }
  </style>
</helmet>
<div style="--bg:#FBF9F4; --bg-alt:#F4EBDA; --accent:#ddbf8d; --accent-dark:#a9824f; --text:#3A332C; --text-soft:#8B7F6E; --line:#e9dfc9; background:var(--bg); color:var(--text); font-family:'Zen Kaku Gothic New', sans-serif; line-height:1.8; letter-spacing:0.02em; min-height:100vh; animation:pageFadeIn .45s ease both;">

  <!-- ヘッダー -->
  <header style="padding:18px 24px; border-bottom:1px solid var(--line); background:rgba(251,249,244,0.92); backdrop-filter:blur(8px);">
    <div style="max-width:680px; margin:0 auto; display:flex; align-items:center; justify-content:space-between;">
      <a href="./index.html" style="font-family:'Shippori Mincho', serif; font-weight:700; font-size:16px; color:var(--text); text-decoration:none;">ユヤの支出改善コーチング</a>
      <a href="./index.html" style="font-size:13px; color:var(--text-soft); text-decoration:none;">← トップに戻る</a>
    </div>
  </header>

  <div style="max-width:560px; margin:0 auto; padding:120px 24px; text-align:center;">
    <div style="width:64px; height:64px; border-radius:50%; background:var(--bg-alt); display:flex; align-items:center; justify-content:center; margin:0 auto 28px;">
      <svg width="28" height="22" viewBox="0 0 28 22" fill="none"><path d="M2 11 L10 19 L26 3" stroke="#a9824f" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"></path></svg>
    </div>
    <h1 style="font-family:'Shippori Mincho', serif; font-weight:600; font-size:26px; margin:0 0 20px; text-wrap:pretty;">お申し込みありがとうございます</h1>
    <p style="font-size:15px; color:var(--text-soft); line-height:1.9; text-wrap:pretty; margin:0 0 40px;">3営業日以内を目安に yuyatachi.coaching25@gmail.com からご連絡いたします。<br>稀に迷惑メールフォルダに入っている可能性もございますので、ご確認ください。<br>もし迷惑メールにも届いていない場合は、大変お手数ですが再度ご連絡いただけますと幸いです。</p>
    <a href="./index.html" style="display:inline-block; background:var(--accent); color:#fff; text-shadow:0 1px 3px rgba(0,0,0,0.35); font-weight:700; font-size:15px; padding:16px 40px; border-radius:100px; text-decoration:none; transition:transform .2s ease, box-shadow .2s ease;" style-hover="background:var(--accent-dark); transform:scale(1.05);">トップページに戻る</a>
  </div>

</div>
</x-dc>

</html>
